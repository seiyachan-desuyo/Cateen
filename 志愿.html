<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银发记忆·时光守护者</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #e5e5e5; /* Darker bg for desktop view contrast */
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .serif {
            font-family: 'Noto Serif SC', serif;
        }
        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .app-container {
            width: 100%;
            max-width: 390px; /* iPhone 13/14 width */
            height: 844px; /* iPhone 13/14 height */
            background-color: #FFFCF5; /* Warm paper color */
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 40px; /* Rounded device corners */
            border: 8px solid #333; /* Device Bezel */
        }
        
        /* Mobile reset for full screen on actual mobile devices */
        @media (max-width: 640px) {
            body {
                background-color: #FFFCF5;
                align-items: flex-start;
            }
            .app-container {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
        }

        .page-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 90px; /* Space for bottom nav */
            position: relative;
        }

        /* Page Transitions */
        .page {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in-right {
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .nav-active {
            color: #C2410C;
        }
        .nav-item {
            transition: all 0.2s ease;
        }
        .nav-item:active {
            transform: scale(0.9);
        }

        /* Custom Audio Player Styling */
        .audio-wave {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 20px;
        }
        .bar {
            width: 3px;
            background-color: #C2410C;
            border-radius: 2px;
            animation: wave 1s infinite ease-in-out;
        }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }

        @keyframes wave {
            0%, 100% { height: 6px; opacity: 0.5; }
            50% { height: 18px; opacity: 1; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Status Bar Simulation -->
    <div class="h-10 w-full bg-[#C2410C] flex justify-between items-center px-6 text-white text-[10px] font-medium z-50 sticky top-0 shrink-0">
        <span>9:41</span>
        <div class="flex gap-1.5">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
            <i class="fas fa-battery-full"></i>
        </div>
    </div>

    <!-- Header (Dynamic) -->
    <header id="header" class="bg-[#C2410C] text-white px-5 py-3 shadow-md z-40 transition-all duration-300 shrink-0 flex justify-between items-center h-16">
        <!-- Default Header Content -->
        <div id="header-default" class="w-full flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold serif tracking-wider">银发记忆</h1>
                <p class="text-[10px] text-orange-100 opacity-90">时光守护者 · 代际陪伴</p>
            </div>
            <div class="flex gap-3">
                <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition backdrop-blur-sm"><i class="fas fa-search text-xs"></i></button>
                <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition backdrop-blur-sm relative">
                    <i class="far fa-bell text-xs"></i>
                    <div class="absolute top-1.5 right-2 w-1.5 h-1.5 bg-red-500 rounded-full border border-[#C2410C]"></div>
                </button>
            </div>
        </div>
        <!-- Detail Header Content (Hidden by default) -->
        <div id="header-detail" class="w-full flex justify-between items-center hidden">
            <button onclick="goBack()" class="w-8 h-8 flex items-center justify-center -ml-2"><i class="fas fa-chevron-left"></i></button>
            <span id="header-title" class="font-bold text-sm truncate max-w-[200px]">详情</span>
            <button class="w-8 h-8 flex items-center justify-center"><i class="fas fa-ellipsis-h"></i></button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="page-content no-scrollbar bg-[#FDFBF7]">
        <!-- Content injected via JS -->
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="absolute bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-gray-100 px-6 py-2 flex justify-between items-end z-30 pb-6 text-[10px] text-gray-400 font-medium transition-transform duration-300">
        <button onclick="router('home')" class="nav-item flex flex-col items-center gap-1 w-12 nav-active" id="nav-home">
            <i class="fas fa-book-open text-xl mb-0.5"></i>
            <span>记忆</span>
        </button>
        <button onclick="router('activity')" class="nav-item flex flex-col items-center gap-1 w-12" id="nav-activity">
            <i class="fas fa-hands-helping text-xl mb-0.5"></i>
            <span>志愿</span>
        </button>
        <button onclick="router('create')" class="nav-item flex flex-col items-center gap-1 -mb-4" id="nav-create">
            <div class="bg-[#C2410C] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-orange-200 transform active:scale-95 transition">
                <i class="fas fa-plus text-lg"></i>
            </div>
            <span class="mt-1 font-bold text-[#C2410C] mb-4">共创</span>
        </button>
        <button onclick="router('community')" class="nav-item flex flex-col items-center gap-1 w-12" id="nav-community">
            <i class="fas fa-comments text-xl mb-0.5"></i>
            <span>社区</span>
        </button>
        <button onclick="router('profile')" class="nav-item flex flex-col items-center gap-1 w-12" id="nav-profile">
            <i class="fas fa-user text-xl mb-0.5"></i>
            <span>我的</span>
        </button>
    </nav>
</div>

<script>
    // --- Data Models ---
    const stories = [
        {
            id: 1,
            title: "那年我在贸大教书的日子",
            subtitle: "见证学校发展的关键节点",
            category: "贸大记忆",
            author: "李建国",
            role: "退休教授",
            date: "2024-05-20",
            image: "https://images.unsplash.com/photo-1544717305-2782549b5136?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
            content: "1954年，我第一次踏入这所学校的大门。那时候的教学楼还没有现在这么气派，但学生们眼里的光，和现在是一样的...",
            audioLength: "12:30",
            tags: ["校史", "50年代", "教学"],
            views: 1203,
            likes: 156,
            type: "audio"
        },
        {
            id: 2,
            title: "抗美援朝战场上的家书",
            subtitle: "跨越70年的红色记忆",
            category: "红色故事",
            author: "张爱华",
            role: "退伍老兵",
            date: "2024-06-01",
            image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
            content: "这封信是我在战壕里写的，当时不知道能不能寄出去。信纸泛黄了，但那是我们那一代人的青春...",
            tags: ["红色精神", "书信", "爱国"],
            views: 3420,
            likes: 420,
            type: "video"
        },
        {
            id: 3,
            title: "芳华里养老院的第一个春节",
            subtitle: "社区里的温暖瞬间",
            category: "人生百态",
            author: "芳华里老人",
            role: "社区居民",
            date: "2024-02-15",
            image: "https://images.unsplash.com/photo-1516307365426-bea591f05011?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
            content: "今年春节，一群大学生来到这里，陪我们包饺子。热气腾腾的饺子，让我想起了小时候...",
            tags: ["社区", "春节", "温暖"],
            views: 856,
            likes: 89,
            type: "text"
        }
    ];

    const activities = [
        {
            id: 1,
            title: "【校内】探访退休教师李奶奶",
            date: "10月15日 14:00-16:00",
            location: "贸大家属院 3号楼",
            type: "陪伴互动",
            status: "招募中",
            slots: "2/3",
            description: "李奶奶是退休英语教师，喜欢阅读和园艺。本次活动主要内容是陪李奶奶聊天，协助整理书架。",
            requirements: "有耐心，英语口语好优先"
        },
        {
            id: 2,
            title: "【校外】芳华里红色故事采访行动",
            date: "10月20日 09:00-12:00",
            location: "芳华里康养社区",
            type: "采访记录",
            status: "即将开始",
            slots: "0/5",
            description: "采访社区内的退伍老兵，记录他们的红色故事。需携带录音设备（团队提供）。",
            requirements: "具备基本的采访技巧，会使用录音笔"
        }
    ];

    // --- State & Router ---
    let historyStack = [];

    function router(pageId, params = null) {
        const content = document.getElementById('main-content');
        const headerDefault = document.getElementById('header-default');
        const headerDetail = document.getElementById('header-detail');
        const bottomNav = document.getElementById('bottom-nav');
        const header = document.getElementById('header');

        // Manage History
        if(pageId !== 'back') {
            historyStack.push({ pageId, params });
        }
        
        // Handle Detail Views (Hide Nav, Show Back Button)
        if (pageId.includes('detail')) {
            bottomNav.style.transform = 'translateY(100%)'; // Slide down nav
            headerDefault.classList.add('hidden');
            headerDetail.classList.remove('hidden');
            headerDetail.classList.add('flex');
            
            // Set header title
            const titleEl = document.getElementById('header-title');
            if(params && params.title) titleEl.innerText = params.title;
            else titleEl.innerText = "详情";

        } else {
            bottomNav.style.transform = 'translateY(0)'; // Show nav
            headerDefault.classList.remove('hidden');
            headerDetail.classList.add('hidden');
            headerDetail.classList.remove('flex');
        }

        // Render Page
        let html = '';
        let animationClass = pageId.includes('detail') ? 'slide-in-right' : 'page';

        switch(pageId) {
            case 'home': html = renderHome(); break;
            case 'activity': html = renderActivity(); break;
            case 'create': html = renderCreate(); break;
            case 'community': html = renderCommunity(); break;
            case 'profile': html = renderProfile(); break;
            case 'story-detail': html = renderStoryDetail(params); break;
            case 'activity-detail': html = renderActivityDetail(params); break;
        }

        content.innerHTML = `<div class="${animationClass}">${html}</div>`;
        content.scrollTop = 0;

        // Update Tab State (Only for main tabs)
        if (!pageId.includes('detail')) {
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('nav-active', 'text-[#C2410C]');
                if(el.id !== 'nav-create') el.classList.add('text-gray-400');
            });
            const activeNav = document.getElementById('nav-' + pageId);
            if(activeNav && pageId !== 'create') {
                activeNav.classList.add('nav-active', 'text-[#C2410C]');
                activeNav.classList.remove('text-gray-400');
            }
        }
    }

    function goBack() {
        historyStack.pop(); // Remove current
        const prev = historyStack.pop(); // Get previous
        if(prev) {
            router(prev.pageId, prev.params);
        } else {
            router('home');
        }
    }

    // --- Render Functions ---

    function renderHome() {
        return `
            <!-- Categories -->
            <div class="px-5 pt-6 pb-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800 serif">记忆分类</h2>
                    <a href="#" class="text-xs text-[#C2410C]">查看全部 <i class="fas fa-chevron-right text-[10px]"></i></a>
                </div>
                <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                    ${['贸大\n记忆', '红色\n故事', '人生\n百态'].map((title, i) => `
                    <div class="flex-shrink-0 w-24 h-32 rounded-2xl relative overflow-hidden shadow-sm group cursor-pointer transform hover:scale-105 transition duration-300">
                        <img src="https://images.unsplash.com/photo-${[
                            '1524178232363-1fb2b075b655', 
                            '1533552039-389369d4bc4d', 
                            '1511632765486-a01980e01a18'
                        ][i]}?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex items-end justify-center pb-4">
                            <span class="text-white font-bold text-sm tracking-widest text-center whitespace-pre-line leading-tight shadow-sm">${title}</span>
                        </div>
                    </div>
                    `).join('')}
                </div>
            </div>

            <!-- Featured Feed -->
            <div class="px-5 py-2">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-lg font-bold text-gray-800 serif">精选推荐</h2>
                    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">每日更新</span>
                </div>
                
                <div class="space-y-6 pb-24">
                    ${stories.map(story => `
                    <div onclick="router('story-detail', {id: ${story.id}})" class="bg-white rounded-2xl shadow-[0_4px_20px_-10px_rgba(0,0,0,0.1)] overflow-hidden active:scale-[0.98] transition-transform duration-200 cursor-pointer group">
                        <div class="relative h-44 overflow-hidden">
                            <img src="${story.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-md text-[10px] px-2.5 py-1 rounded-lg font-bold text-gray-700 shadow-sm border border-white/50">
                                ${story.category}
                            </div>
                            ${story.type === 'audio' ? `
                            <div class="absolute bottom-3 right-3 bg-black/40 backdrop-blur-md text-white px-3 py-1.5 rounded-full text-[10px] flex items-center gap-2 border border-white/10">
                                <div class="audio-wave scale-75">
                                    <div class="bar bg-white"></div><div class="bar bg-white"></div><div class="bar bg-white"></div>
                                </div>
                                12:30
                            </div>` : ''}
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-gray-800 text-base mb-1 line-clamp-1">${story.title}</h3>
                            <p class="text-xs text-gray-500 mb-3 line-clamp-1">${story.subtitle}</p>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <div class="w-5 h-5 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 text-[10px] font-bold">
                                        ${story.author.charAt(0)}
                                    </div>
                                    <span class="text-xs text-gray-500">${story.author} · ${story.role}</span>
                                </div>
                                <div class="flex items-center gap-3 text-gray-400 text-[10px]">
                                    <span><i class="far fa-eye mr-1"></i>${story.views}</span>
                                    <span><i class="far fa-heart mr-1"></i>${story.likes}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function renderStoryDetail(params) {
        const story = stories.find(s => s.id === params.id) || stories[0];
        
        // Update header title for context
        setTimeout(() => {
             document.getElementById('header-title').innerText = story.category;
        }, 0);

        return `
            <div class="bg-white min-h-full pb-10">
                <!-- Hero Image -->
                <div class="relative h-64">
                    <img src="${story.image}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent"></div>
                </div>
                
                <div class="px-6 -mt-12 relative z-10">
                    <!-- Title Section -->
                    <div class="mb-6">
                        <div class="flex items-center gap-2 mb-2">
                             <span class="bg-[#C2410C]/10 text-[#C2410C] px-2 py-0.5 rounded text-[10px] font-bold border border-[#C2410C]/20">${story.category}</span>
                             <span class="text-gray-400 text-[10px]">${story.date}</span>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-900 serif leading-tight mb-2">${story.title}</h1>
                        <p class="text-sm text-gray-500">${story.subtitle}</p>
                    </div>

                    <!-- Author Bar -->
                    <div class="flex items-center justify-between py-4 border-y border-gray-100 mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden">
                                <img src="https://api.dicebear.com/7.x/miniavs/svg?seed=${story.author}" class="w-full h-full">
                            </div>
                            <div>
                                <div class="text-sm font-bold text-gray-800">${story.author}</div>
                                <div class="text-[10px] text-gray-500">${story.role}</div>
                            </div>
                        </div>
                        <button class="bg-[#C2410C] text-white text-xs px-4 py-1.5 rounded-full shadow-md shadow-orange-200">关注</button>
                    </div>

                    <!-- Audio Player (If Audio) -->
                    ${story.type === 'audio' ? `
                    <div class="bg-[#FDFBF7] p-4 rounded-xl border border-orange-100 mb-6 flex items-center gap-4 shadow-sm">
                        <button class="w-10 h-10 rounded-full bg-[#C2410C] text-white flex items-center justify-center shrink-0 shadow-md">
                            <i class="fas fa-play ml-1 text-sm"></i>
                        </button>
                        <div class="flex-1">
                            <div class="text-xs font-bold text-gray-800 mb-1">口述历史录音</div>
                            <div class="h-1 bg-gray-200 rounded-full w-full overflow-hidden">
                                <div class="h-full bg-[#C2410C] w-1/3"></div>
                            </div>
                            <div class="flex justify-between text-[10px] text-gray-400 mt-1">
                                <span>04:12</span>
                                <span>${story.audioLength}</span>
                            </div>
                        </div>
                    </div>` : ''}

                    <!-- Content -->
                    <div class="prose prose-sm prose-orange text-gray-700 leading-relaxed mb-8 font-light">
                        <p class="mb-4"><span class="text-3xl float-left mr-2 font-serif text-[#C2410C]">“</span>${story.content}</p>
                        <p class="mb-4">那时候的日子很慢，车，马，邮件都慢。我们总是聚在一起，讨论国家大事，讨论如何把课上好。现在的年轻人条件好了，但我希望你们不要忘记那段艰苦奋斗的历史。</p>
                        <p>记得有一次冬天，教室里没有暖气，大家手都冻僵了，但没有一个人退缩...</p>
                    </div>

                    <!-- Interaction Bar -->
                    <div class="flex justify-center gap-8 py-6">
                        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-[#C2410C] transition">
                            <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-xl shadow-sm"><i class="far fa-heart"></i></div>
                            <span class="text-xs">${story.likes}</span>
                        </button>
                        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-blue-500 transition">
                            <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-xl shadow-sm"><i class="far fa-comment-dots"></i></div>
                            <span class="text-xs">24</span>
                        </button>
                        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-500 transition">
                            <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-xl shadow-sm"><i class="fab fa-weixin"></i></div>
                            <span class="text-xs">分享</span>
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderActivity() {
        return `
            <div class="px-5 py-6">
                <!-- Dashboard -->
                <div class="bg-white rounded-2xl p-4 shadow-sm mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800 text-sm">我的志愿数据</h3>
                        <span class="text-[10px] text-gray-400">更新于今日</span>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="text-center">
                            <div class="text-xl font-bold text-[#C2410C] serif">12.5</div>
                            <div class="text-[10px] text-gray-500 mt-1">服务时长(h)</div>
                        </div>
                        <div class="text-center border-l border-gray-100">
                            <div class="text-xl font-bold text-[#C2410C] serif">3</div>
                            <div class="text-[10px] text-gray-500 mt-1">参与活动</div>
                        </div>
                        <div class="text-center border-l border-gray-100">
                            <div class="text-xl font-bold text-[#C2410C] serif">LV.2</div>
                            <div class="text-[10px] text-gray-500 mt-1">青铜志愿者</div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-4 px-1">
                    <h2 class="text-lg font-bold text-gray-800 serif border-l-4 border-[#C2410C] pl-3">活动招募</h2>
